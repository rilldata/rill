measures:
  - name: total_active_rental_license_records_measure
    display_name: Total License Records
    expression: COUNT(*)
    description: Total number of records in Active_Rental_Licenses.
    format_preset: humanize
  - name: total_licensed_units_measure
    display_name: Total Licensed Units
    expression: SUM(licensedUnits)
    description: Sum of licensedUnits across all license records.
    format_preset: humanize
  - name: average_licensed_units_per_license_measure
    display_name: Average Licensed Units per License
    expression: AVG(licensedUnits)
    description: Average number of licensed units per license record.
    format_preset: humanize
  - name: min_licensed_units_measure
    display_name: Minimum Licensed Units
    expression: MIN(licensedUnits)
    description: Smallest licensedUnits value among all license records.
    format_preset: humanize
  - name: max_licensed_units_measure
    display_name: Maximum Licensed Units
    expression: MAX(licensedUnits)
    description: Largest licensedUnits value among all license records.
    format_preset: humanize
  - name: distinct_license_numbers_measure
    display_name: Distinct License Numbers
    expression: COUNT(DISTINCT licenseNumber)
    description: Count of unique licenseNumber values.
    format_preset: humanize
  - name: distinct_parcel_numbers_measure
    display_name: Distinct Parcel Numbers (APN)
    expression: COUNT(DISTINCT apn)
    description: Count of unique parcel identifiers (apn).
    format_preset: humanize
  - name: distinct_owners_measure
    display_name: Distinct Owners
    expression: COUNT(DISTINCT ownerName)
    description: Count of unique ownerName values.
    format_preset: humanize
  - name: distinct_applicants_measure
    display_name: Distinct Applicants
    expression: COUNT(DISTINCT applicantName)
    description: Count of unique applicantName values.
    format_preset: humanize
  - name: short_term_rental_flag_count_measure
    display_name: Short-Term Rental Flag Count
    expression: SUM(CAST(shortTermRental AS BIGINT))
    description: Count of records flagged as short-term rentals (true values summed).
    format_preset: humanize
