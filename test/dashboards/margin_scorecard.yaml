# Explore YAML
# Reference documentation: https://docs.rilldata.com/reference/project-files/canvas-dashboards

type: canvas
defaults:
  time_range: PT24H
  comparison_mode: time
display_name: Margin Scorecard
rows:
  - items:
      - markdown:
          title: ""
          description: ""
          content: |+
            # Margin Metrics Scorecard

          alignment:
            horizontal: left
            vertical: middle
        width: 12
    height: 40px
  - items:
      - custom_chart:
          metrics_sql:
            - ""
          vega_spec: ""
        width: 4
      - pivot:
          col_dimensions:
            - plan_name
            - environment
          measures:
            - total_cost
          metrics_view: metrics_margin_metrics
          row_dimensions:
            - customer
            - location
        width: 4
      - pivot:
          col_dimensions:
            - plan_name
            - environment
          measures:
            - total_cost
          metrics_view: metrics_margin_metrics
          row_dimensions:
            - customer
            - location
        width: 4
    height: 433px
  - items:
      - donut_chart:
          color:
            field: app_name
            limit: 20
            showOther: true
            sort: -measure
            type: nominal
          innerRadius: 50
          measure:
            field: total_cost
            showTotal: true
            type: quantitative
          metrics_view: metrics_margin_metrics
        width: 6
      - donut_chart:
          color:
            field: environment
            limit: 20
            showOther: true
            type: nominal
          innerRadius: 50
          measure:
            field: total_cost
            showTotal: true
            type: quantitative
          metrics_view: metrics_margin_metrics
        width: 6
    height: 40px
  - items:
      - kpi_grid:
          metrics_view: metrics_margin_metrics
          measures:
            - total_cost
            - total_revenue
            - net_revenue
            - gross_margin_percent
            - unique_customers
          comparison:
            - delta
            - percent_change
          sparkline: right
          time_filters: tr=P4W&grain=day
          title: Last 4 Weeks
        width: 12
    height: 128px
  - items:
      - kpi_grid:
          metrics_view: metrics_margin_metrics
          measures:
            - total_cost
            - total_revenue
            - net_revenue
            - gross_margin_percent
            - unique_customers
          comparison:
            - delta
            - percent_change
          sparkline: right
          time_filters: tr=rill-QTD&grain=day
          title: Quarter to date
        width: 12
    height: 128px
  - items:
      - table:
          metrics_view: metrics_margin_metrics
          columns:
            - customer
            - total_cost
            - total_revenue
            - net_revenue
            - gross_margin_percent
            - unique_customers
          time_filters: tr=rill-QTD&compare_tr=rill-PP&grain=day
          title: Margin by Customer - Quarter to date
        width: 12
    height: 300px
filters:
  enable: true
