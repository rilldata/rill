# This should be used for docs also
#
# Content-Security-Policy is set dynamically by the csp-nonce edge function
# (netlify/edge-functions/csp-nonce.ts), which injects a per-request nonce
# into HTML responses and builds the CSP header at request time. Static header
# rules cannot include nonces, so CSP is intentionally absent here.
#
# All other security headers are set below and inherited across route rules.

# Edge function: inject CSP nonce into HTML responses for all routes.
[[edge_functions]]
  function = "csp-nonce"
  path = "/*"
  [edge_functions.rate_limit]
    window_limit = 150
    window_size = 60
    aggregate_by = ["ip", "domain"]

# Default security headers for main application.
[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "geolocation=(),midi=(),sync-xhr=(self),microphone=(),camera=(),magnetometer=(),gyroscope=(),fullscreen=(self),payment=()"
    Referrer-Policy = "no-referrer"
    X-Content-Type-Options = "nosniff"
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Opener-Policy = "unsafe-none"
    Cross-Origin-Resource-Policy = "cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
