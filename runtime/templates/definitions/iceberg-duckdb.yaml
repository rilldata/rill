name: iceberg-duckdb
display_name: "Iceberg (DuckDB)"
driver: ""
olap: duckdb
tags: ["iceberg", "table-format", "duckdb", "source"]
files:
  - name: model
    path_template: "models/[[ .model_name ]].yaml"
    code_template: |
      type: model
      materialize: true
      pre_exec: |
        INSTALL ICEBERG;
        LOAD ICEBERG;
        CREATE SECRET IF NOT EXISTS (
          TYPE S3,
          KEY_ID '[[ .aws_access_key_id ]]',
          SECRET '[[ .aws_secret_access_key ]]',
          REGION '[[ .aws_region ]]'
        )
      sql: |
        SELECT *
        FROM iceberg_scan(
          's3://[[ .bucket ]]/[[ .path ]]',
          allow_moved_paths = true
        );
