name: sqlite-duckdb
display_name: "SQLite (DuckDB)"
driver: sqlite
olap: duckdb
tags: ["sqlite", "database", "duckdb", "source"]
files:
  - name: model
    path_template: "models/[[ .model_name ]].yaml"
    code_template: |
      # Model YAML
      # Reference documentation: https://docs.rilldata.com/developers/build/connectors/data-source/sqlite
      type: model
      connector: duckdb
      sql: |
        [[ .sql ]]
