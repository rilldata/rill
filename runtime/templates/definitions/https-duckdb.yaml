name: https-duckdb
display_name: "HTTPS (DuckDB)"
driver: https
olap: duckdb
tags: ["https", "http", "url", "file-store", "duckdb", "source"]
files:
  - name: model
    path_template: "models/[[ .model_name ]].yaml"
    code_template: |
      # Model YAML
      # Reference documentation: https://docs.rilldata.com/developers/build/connect/#adding-a-remote-source
      type: model
      connector: duckdb
      [[ if .create_secrets_from_connectors -]]
      create_secrets_from_connectors: "[[ .create_secrets_from_connectors ]]"
      [[ end -]]
      sql: |
        [[ .sql ]]
