name: gcs-duckdb
display_name: "GCS (DuckDB)"
driver: gcs
olap: duckdb
tags: ["gcs", "google", "object-storage", "duckdb", "source"]
files:
  - name: model
    path_template: "models/[[ .model_name ]].yaml"
    code_template: |
      # Model YAML
      # Reference documentation: https://docs.rilldata.com/developers/build/connectors/data-source/gcs
      type: model
      connector: duckdb
      [[ if .create_secrets_from_connectors -]]
      create_secrets_from_connectors: "[[ .create_secrets_from_connectors ]]"
      [[ end -]]
      sql: |
        [[ .sql ]]
