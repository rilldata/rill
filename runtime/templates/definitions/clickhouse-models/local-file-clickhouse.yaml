name: local-file-clickhouse
display_name: "Local File (ClickHouse)"
driver: local_file
olap: clickhouse
tags: ["local", "file", "clickhouse", "source"]
files:
  - name: model
    path_template: "models/[[ .model_name ]].yaml"
    code_template: |
      # Model YAML
      # Reference documentation: https://docs.rilldata.com/reference/project-files/models
      type: model
      materialize: true
      connector: clickhouse
      sql: |
        [[ .sql ]]
