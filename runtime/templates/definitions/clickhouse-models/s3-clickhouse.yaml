name: s3-clickhouse
display_name: "S3 (ClickHouse)"
driver: s3
olap: clickhouse
tags: ["s3", "aws", "object-storage", "clickhouse", "source"]
files:
  - name: model
    path_template: "models/[[ .model_name ]].yaml"
    code_template: |
      # Model YAML
      # Reference documentation: https://docs.rilldata.com/reference/project-files/models
      type: model
      materialize: true
      connector: clickhouse
      sql: |
        [[ .sql ]]
