name: azure-clickhouse
display_name: "Azure Blob Storage (ClickHouse)"
driver: azure
olap: clickhouse
tags: ["azure", "microsoft", "object-storage", "clickhouse", "source"]
files:
  - name: model
    path_template: "models/[[ .model_name ]].yaml"
    code_template: |
      # Model YAML
      # Reference documentation: https://docs.rilldata.com/reference/project-files/models
      type: model
      materialize: true
      connector: clickhouse
      sql: |
        [[ .sql ]]
