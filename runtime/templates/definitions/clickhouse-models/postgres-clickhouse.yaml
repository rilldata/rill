name: postgres-clickhouse
display_name: "PostgreSQL (ClickHouse)"
driver: postgres
olap: clickhouse
tags: ["postgres", "postgresql", "database", "clickhouse", "source"]
files:
  - name: model
    path_template: "models/[[ .model_name ]].yaml"
    code_template: |
      # Model YAML
      # Reference documentation: https://docs.rilldata.com/reference/project-files/models
      type: model
      materialize: true
      connector: clickhouse
      sql: |
        [[ .sql ]]
