name: s3-duckdb
display_name: "S3 (DuckDB)"
driver: s3
olap: duckdb
tags: ["s3", "aws", "object-storage", "duckdb", "source"]
files:
  - name: model
    path_template: "models/[[ .model_name ]].yaml"
    code_template: |
      # Model YAML
      # Reference documentation: https://docs.rilldata.com/developers/build/connectors/data-source/s3
      type: model
      connector: duckdb
      [[ if .create_secrets_from_connectors -]]
      create_secrets_from_connectors: "[[ .create_secrets_from_connectors ]]"
      [[ end -]]
      sql: |
        [[ .sql ]]
