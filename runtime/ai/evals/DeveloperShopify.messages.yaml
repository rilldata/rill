  content: '{"diff":"--- /models/shopify_orders.yaml\n+++ /models/shopify_orders.yaml\n@@ -1 +1,263 @@\n-\n+type: model\n+materialize: true\n+\n+# Mock Shopify orders data (synthetic, deterministic)\n+# Materialized into the default DuckDB OLAP connector.\n+\n+sql: |\n+  WITH\n+  params AS (\n+    SELECT\n+      180::INT AS days_back,\n+      12000::INT AS n_orders,\n+      2500::INT AS n_customers\n+  ),\n+\n+  -- Generate a stable sequence of orders\n+  base AS (\n+    SELECT\n+      i AS order_number,\n+      -- Deterministic \"random\" values derived from the order_number\n+      hash(i::VARCHAR) AS h1,\n+      hash((i::VARCHAR) || '':b'') AS h2,\n+      hash((i::VARCHAR) || '':c'') AS h3,\n+      hash((i::VARCHAR) || '':d'') AS h4\n+    FROM range(1, (SELECT n_orders FROM params) + 1) t(i)\n+  ),\n+\n+  -- Create timestamps spanning the last 180 days with realistic intra-day variation\n+  times AS (\n+    SELECT\n+      b.*, \n+      (\n+        date_trunc(''day'', now())\n+        - ((abs(b.h1) % (SELECT days_back FROM params))::INT) * INTERVAL 1 DAY\n+        + ((abs(b.h2) % 86400)::INT) * INTERVAL 1 SECOND\n+      )::TIMESTAMP AS created_at,\n+      (\n+        (\n+          date_trunc(''day'', now())\n+          - ((abs(b.h1) % (SELECT days_back FROM params))::INT) * INTERVAL 1 DAY\n+          + ((abs(b.h2) % 86400)::INT) * INTERVAL 1 SECOND\n+        )\n+        + (10 + (abs(b.h3) % 7200))::INT * INTERVAL 1 SECOND\n+      )::TIMESTAMP AS processed_at\n+    FROM base b\n+  ),\n+\n+  customers AS (\n+    SELECT\n+      t.*,\n+      (abs(t.h4) % (SELECT n_customers FROM params) + 1)::INT AS customer_num\n+    FROM times t\n+  ),\n+\n+  dims AS (\n+    SELECT\n+      c.*,\n+      -- IDs\n+      (''gid://shopify/Order/'' || lpad(c.order_number::VARCHAR, 10, ''0'')) AS order_id,\n+      (''gid://shopify/Customer/'' || lpad(c.customer_num::VARCHAR, 10, ''0'')) AS customer_id,\n+      (''customer'' || c.customer_num::VARCHAR || ''@example.com'') AS customer_email,\n+\n+      -- Geography (simple but realistic)\n+      CASE (abs(hash(c.customer_num::VARCHAR)) % 6)\n+        WHEN 0 THEN ''US''\n+        WHEN 1 THEN ''CA''\n+        WHEN 2 THEN ''GB''\n+        WHEN 3 THEN ''AU''\n+        WHEN 4 THEN ''DE''\n+        ELSE ''FR''\n+      END AS customer_country,\n+      CASE\n+        WHEN (abs(hash(c.customer_num::VARCHAR)) % 6) = 0 THEN\n+          CASE (abs(hash(c.customer_num::VARCHAR || '':r'')) % 6)\n+            WHEN 0 THEN ''CA''\n+            WHEN 1 THEN ''NY''\n+            WHEN 2 THEN ''TX''\n+            WHEN 3 THEN ''FL''\n+            WHEN 4 THEN ''WA''\n+            ELSE ''IL''\n+          END\n+        WHEN (abs(hash(c.customer_num::VARCHAR)) % 6) = 1 THEN\n+          CASE (abs(hash(c.customer_num::VARCHAR || '':r'')) % 4)\n+            WHEN 0 THEN ''ON''\n+            WHEN 1 THEN ''BC''\n+            WHEN 2 THEN ''QC''\n+            ELSE ''AB''\n+          END\n+        WHEN (abs(hash(c.customer_num::VARCHAR)) % 6) = 2 THEN\n+          CASE (abs(hash(c.customer_num::VARCHAR || '':r'')) % 4)\n+            WHEN 0 THEN ''ENG''\n+            WHEN 1 THEN ''SCT''\n+            WHEN 2 THEN ''WLS''\n+            ELSE ''NIR''\n+          END\n+        WHEN (abs(hash(c.customer_num::VARCHAR)) % 6) = 3 THEN\n+          CASE (abs(hash(c.customer_num::VARCHAR || '':r'')) % 4)\n+            WHEN 0 THEN ''NSW''\n+            WHEN 1 THEN ''VIC''\n+            WHEN 2 THEN ''QLD''\n+            ELSE ''WA''\n+          END\n+        WHEN (abs(hash(c.customer_num::VARCHAR)) % 6) = 4 THEN\n+          CASE (abs(hash(c.customer_num::VARCHAR || '':r'')) % 4)\n+            WHEN 0 THEN ''BE''\n+            WHEN 1 THEN ''BW''\n+            WHEN 2 THEN ''BY''\n+            ELSE ''NW''\n+          END\n+        ELSE\n+          CASE (abs(hash(c.customer_num::VARCHAR || '':r'')) % 4)\n+            WHEN 0 THEN ''IDF''\n+            WHEN 1 THEN ''ARA''\n+            WHEN 2 THEN ''NAQ''\n+            ELSE ''OCC''\n+          END\n+      END AS customer_region,\n+\n+      -- Channel\n+      CASE (abs(c.h2) % 10)\n+        WHEN 0 THEN ''pos''\n+        WHEN 1 THEN ''draft_orders''\n+        ELSE ''online_store''\n+      END AS channel,\n+\n+      -- Currency (mostly USD)\n+      CASE (abs(c.h3) % 20)\n+        WHEN 0 THEN ''CAD''\n+        WHEN 1 THEN ''GBP''\n+        WHEN 2 THEN ''EUR''\n+        WHEN 3 THEN ''AUD''\n+        ELSE ''USD''\n+      END AS currency,\n+\n+      -- Items count (1-6)\n+      (1 + (abs(c.h1) % 6))::INT AS items_count\n+    FROM customers c\n+  ),\n+\n+  pricing AS (\n+    SELECT\n+      d.*,\n+      -- Subtotal: items_count * unit_price with some variation\n+      round(\n+        d.items_count * (10 + (abs(d.h1) % 9000) / 100.0)\n+        , 2\n+      )::DOUBLE AS subtotal_price,\n+\n+      -- Shipping: often free above a threshold, otherwise small\n+      round(\n+        CASE\n+          WHEN (d.items_count \u003e= 3) AND ((abs(d.h2) % 10) \u003c 4) THEN 0\n+          ELSE (3 + (abs(d.h2) % 1200) / 100.0)\n+        END\n+        , 2\n+      )::DOUBLE AS shipping_price,\n+\n+      -- Discount: ~30% of orders have a discount\n+      round(\n+        CASE\n+          WHEN (abs(d.h3) % 10) \u003c 3 THEN (abs(d.h3) % 2500) / 100.0\n+          ELSE 0\n+        END\n+        , 2\n+      )::DOUBLE AS discount_price\n+    FROM dims d\n+  ),\n+\n+  taxes AS (\n+    SELECT\n+      p.*,\n+      -- Tax rate depends on country (simplified)\n+      CASE p.customer_country\n+        WHEN ''US'' THEN 0.0725\n+        WHEN ''CA'' THEN 0.0500\n+        WHEN ''GB'' THEN 0.2000\n+        WHEN ''AU'' THEN 0.1000\n+        WHEN ''DE'' THEN 0.1900\n+        ELSE 0.2000\n+      END AS tax_rate\n+    FROM pricing p\n+  ),\n+\n+  totals AS (\n+    SELECT\n+      t.*,\n+      round((t.subtotal_price - t.discount_price) * t.tax_rate, 2)::DOUBLE AS tax_price,\n+      round(t.subtotal_price + t.shipping_price + ((t.subtotal_price - t.discount_price) * t.tax_rate) - t.discount_price, 2)::DOUBLE AS total_price\n+    FROM taxes t\n+  ),\n+\n+  statuses AS (\n+    SELECT\n+      x.*,\n+      -- Financial status distribution\n+      CASE\n+        WHEN (abs(x.h4) % 100) \u003c 78 THEN ''paid''\n+        WHEN (abs(x.h4) % 100) \u003c 90 THEN ''pending''\n+        WHEN (abs(x.h4) % 100) \u003c 96 THEN ''partially_refunded''\n+        ELSE ''refunded''\n+      END AS financial_status,\n+\n+      -- Fulfillment status distribution\n+      CASE\n+        WHEN (abs(x.h2) % 100) \u003c 70 THEN ''fulfilled''\n+        WHEN (abs(x.h2) % 100) \u003c 82 THEN ''partial''\n+        ELSE ''unfulfilled''\n+      END AS fulfillment_status\n+    FROM totals x\n+  ),\n+\n+  refunds AS (\n+    SELECT\n+      s.*,\n+      round(\n+        CASE s.financial_status\n+          WHEN ''refunded'' THEN s.total_price\n+          WHEN ''partially_refunded'' THEN round(s.total_price * (0.10 + (abs(s.h1) % 60) / 100.0), 2)\n+          ELSE 0\n+        END\n+        , 2\n+      )::DOUBLE AS total_refunded\n+    FROM statuses s\n+  ),\n+\n+  customer_flags AS (\n+    SELECT\n+      r.*,\n+      -- Determine first order per customer based on created_at then order_number\n+      row_number() OVER (PARTITION BY r.customer_id ORDER BY r.created_at, r.order_number) AS rn\n+    FROM refunds r\n+  )\n+\n+  SELECT\n+    order_id,\n+    order_number,\n+    created_at,\n+    processed_at,\n+    customer_id,\n+    customer_email,\n+    customer_country,\n+    customer_region,\n+    channel,\n+    financial_status,\n+    fulfillment_status,\n+    currency,\n+    subtotal_price,\n+    shipping_price,\n+    tax_price,\n+    discount_price,\n+    -- Ensure consistency: subtotal + shipping + tax - discount\n+    round(subtotal_price + shipping_price + tax_price - discount_price, 2)::DOUBLE AS total_price,\n+    -- Ensure refunded amounts consistent with financial_status\n+    CASE\n+      WHEN financial_status = ''refunded'' THEN round(subtotal_price + shipping_price + tax_price - discount_price, 2)::DOUBLE\n+      WHEN financial_status = ''partially_refunded'' THEN least(total_refunded, round(subtotal_price + shipping_price + tax_price - discount_price, 2)::DOUBLE)\n+      ELSE 0::DOUBLE\n+    END AS total_refunded,\n+    items_count,\n+    (rn = 1) AS is_first_order,\n+    (rn \u003e 1) AS is_returning_customer\n+  FROM customer_flags\n+\n","is_new_file":true,"resources":[{"kind":"rill.runtime.v1.Model","name":"shopify_orders","reconcile_error":"","reconcile_status":"RECONCILE_STATUS_IDLE"}]}'
