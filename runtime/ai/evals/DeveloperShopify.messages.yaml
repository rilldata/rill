- id: 2775289e-5561-4eb7-a703-f3b26891c95f
  parent_id: 015ab47e-f241-4772-959f-9f8e2c69ef08
  session_id: 41b8c021-d5b6-4c76-9a19-17e8d2d6dd99
  time: 2026-03-04T13:00:28.164828Z
  index: 45
  role: assistant
  type: result
  tool: read_file
  content_type: json
  content: '{"Contents":"type: model\nmaterialize: true\n\n# Mock Shopify orders generated fully in DuckDB (no external sources)\n# Produces ~12k rows spanning the last 180 days, weighted toward recent days.\n\n# Ensure deterministic-ish randomness\npre_exec: |\n  SELECT setseed(0.42);\n\nsql: |\n  WITH base AS (\n    -- Generate ~12k synthetic orders\n    SELECT\n      i AS idx,\n      -- Weight timestamps toward recent days using a squared distribution\n      -- days_ago in [0, 179], with more mass near 0\n      CAST(floor(pow(random(), 2) * 180) AS INTEGER) AS days_ago,\n      random() AS r1,\n      random() AS r2,\n      random() AS r3,\n      random() AS r4,\n      random() AS r5,\n      random() AS r6,\n      random() AS r7,\n      random() AS r8,\n      random() AS r9,\n      random() AS r10\n    FROM range(1, 12001) t(i)\n  ),\n  times AS (\n    SELECT\n      idx,\n      -- created_at spread within the chosen day\n      (now() - (days_ago || '' days'')::INTERVAL)\n        - (CAST(floor(r1 * 86400) AS BIGINT) || '' seconds'')::INTERVAL AS created_at,\n      -- processed_at typically within 0-6 hours after created_at\n      (now() - (days_ago || '' days'')::INTERVAL)\n        - (CAST(floor(r1 * 86400) AS BIGINT) || '' seconds'')::INTERVAL\n        + (CAST(floor(r2 * 6 * 3600) AS BIGINT) || '' seconds'')::INTERVAL AS processed_at,\n      r1,r2,r3,r4,r5,r6,r7,r8,r9,r10\n    FROM base\n  ),\n  dims AS (\n    SELECT\n      idx,\n      created_at,\n      processed_at,\n\n      -- IDs\n      (''gid://shopify/Order/'' || lpad(CAST(1000000000 + idx AS VARCHAR), 10, ''0'')) AS order_id,\n      (1000 + idx) AS order_number,\n\n      (''gid://shopify/Customer/'' || lpad(CAST(2000000000 + CAST(floor(r3 * 5000) AS BIGINT) AS VARCHAR), 10, ''0'')) AS customer_id,\n      (\n        ''customer'' || CAST(1 + CAST(floor(r3 * 5000) AS BIGINT) AS VARCHAR) ||\n        ''+'' || CAST(1 + CAST(floor(r4 * 999) AS BIGINT) AS VARCHAR) ||\n        ''@example.com''\n      ) AS customer_email,\n\n      -- Geography (simple but plausible)\n      CASE\n        WHEN r5 \u003c 0.70 THEN ''US''\n        WHEN r5 \u003c 0.82 THEN ''CA''\n        WHEN r5 \u003c 0.90 THEN ''GB''\n        WHEN r5 \u003c 0.95 THEN ''AU''\n        ELSE ''DE''\n      END AS customer_country,\n      CASE\n        WHEN r5 \u003c 0.70 THEN\n          CASE\n            WHEN r6 \u003c 0.18 THEN ''CA''\n            WHEN r6 \u003c 0.33 THEN ''NY''\n            WHEN r6 \u003c 0.48 THEN ''TX''\n            WHEN r6 \u003c 0.60 THEN ''FL''\n            WHEN r6 \u003c 0.72 THEN ''WA''\n            WHEN r6 \u003c 0.84 THEN ''IL''\n            ELSE ''MA''\n          END\n        WHEN r5 \u003c 0.82 THEN\n          CASE\n            WHEN r6 \u003c 0.40 THEN ''ON''\n            WHEN r6 \u003c 0.65 THEN ''BC''\n            WHEN r6 \u003c 0.85 THEN ''QC''\n            ELSE ''AB''\n          END\n        WHEN r5 \u003c 0.90 THEN\n          CASE\n            WHEN r6 \u003c 0.45 THEN ''ENG''\n            WHEN r6 \u003c 0.70 THEN ''SCT''\n            WHEN r6 \u003c 0.85 THEN ''WLS''\n            ELSE ''NIR''\n          END\n        WHEN r5 \u003c 0.95 THEN\n          CASE\n            WHEN r6 \u003c 0.55 THEN ''NSW''\n            WHEN r6 \u003c 0.80 THEN ''VIC''\n            ELSE ''QLD''\n          END\n        ELSE\n          CASE\n            WHEN r6 \u003c 0.50 THEN ''BE''\n            WHEN r6 \u003c 0.80 THEN ''BW''\n            ELSE ''BY''\n          END\n      END AS customer_region,\n\n      -- Channel\n      CASE\n        WHEN r7 \u003c 0.72 THEN ''online_store''\n        WHEN r7 \u003c 0.84 THEN ''pos''\n        WHEN r7 \u003c 0.92 THEN ''draft_orders''\n        ELSE ''marketplaces''\n      END AS channel,\n\n      -- Statuses\n      CASE\n        WHEN r8 \u003c 0.80 THEN ''paid''\n        WHEN r8 \u003c 0.92 THEN ''pending''\n        WHEN r8 \u003c 0.97 THEN ''partially_refunded''\n        ELSE ''refunded''\n      END AS financial_status,\n      CASE\n        WHEN r9 \u003c 0.68 THEN ''fulfilled''\n        WHEN r9 \u003c 0.78 THEN ''partial''\n        WHEN r9 \u003c 0.96 THEN ''unfulfilled''\n        ELSE ''restocked''\n      END AS fulfillment_status,\n\n      ''USD'' AS currency,\n\n      -- Counts and flags\n      CAST(1 + floor(r10 * 5) AS INTEGER) AS items_count,\n      (random() \u003c 0.22) AS is_first_order,\n      (random() \u003c 0.35) AS marketing_opt_in,\n\n      -- Discount code: some nulls, some common codes\n      CASE\n        WHEN random() \u003c 0.70 THEN NULL\n        WHEN random() \u003c 0.82 THEN ''WELCOME10''\n        WHEN random() \u003c 0.92 THEN ''FREESHIP''\n        WHEN random() \u003c 0.97 THEN ''SPRING15''\n        ELSE ''VIP20''\n      END AS discount_code,\n\n      -- Payment gateway\n      CASE\n        WHEN random() \u003c 0.55 THEN ''shopify_payments''\n        WHEN random() \u003c 0.72 THEN ''paypal''\n        WHEN random() \u003c 0.86 THEN ''stripe''\n        WHEN random() \u003c 0.94 THEN ''apple_pay''\n        ELSE ''google_pay''\n      END AS payment_gateway\n    FROM times\n  ),\n  prices AS (\n    SELECT\n      d.*,\n\n      -- Subtotal: roughly $15-$250, scaled by items_count\n      round(greatest(0, (15 + random() * 235) * (0.7 + items_count * 0.25)), 2) AS subtotal_price,\n\n      -- Shipping: $0-$18, more likely free with FREESHIP\n      round(\n        CASE\n          WHEN discount_code = ''FREESHIP'' THEN 0\n          WHEN random() \u003c 0.15 THEN 0\n          ELSE 3 + random() * 15\n        END,\n        2\n      ) AS shipping_price,\n\n      -- Tax: 0-10% of subtotal (approx)\n      round(greatest(0, (random() * 0.10) * (15 + random() * 235)), 2) AS tax_price,\n\n      -- Discount: 0-25% of subtotal depending on code\n      round(\n        CASE\n          WHEN discount_code IS NULL THEN 0\n          WHEN discount_code = ''WELCOME10'' THEN (0.10 + random() * 0.03)\n          WHEN discount_code = ''SPRING15'' THEN (0.15 + random() * 0.03)\n          WHEN discount_code = ''VIP20'' THEN (0.20 + random() * 0.05)\n          WHEN discount_code = ''FREESHIP'' THEN (random() * 0.05)\n          ELSE (random() * 0.10)\n        END * (15 + random() * 235),\n        2\n      ) AS discount_price\n    FROM dims d\n  ),\n  totals AS (\n    SELECT\n      p.*,\n      -- Total computed from components; ensure non-negative\n      round(greatest(0, subtotal_price + shipping_price + tax_price - discount_price), 2) AS total_price\n    FROM prices p\n  )\n  SELECT\n    order_id,\n    order_number,\n    created_at,\n    processed_at,\n    customer_id,\n    customer_email,\n    customer_country,\n    customer_region,\n    channel,\n    financial_status,\n    fulfillment_status,\n    currency,\n    subtotal_price,\n    shipping_price,\n    tax_price,\n    discount_price,\n    total_price,\n    -- Refunded statuses sometimes have refunds \u003e 0\n    round(\n      CASE\n        WHEN financial_status IN (''refunded'', ''partially_refunded'') AND random() \u003c 0.85 THEN\n          greatest(0, total_price * (CASE WHEN financial_status = ''refunded'' THEN (0.60 + random() * 0.40) ELSE (0.10 + random() * 0.50) END))\n        ELSE 0\n      END,\n      2\n    ) AS total_refunded,\n    items_count,\n    is_first_order,\n    marketing_opt_in,\n    discount_code,\n    payment_gateway\n  FROM totals\n\noutput:\n  connector: duckdb\n  table: shopify_orders\n"}'
