    - role: assistant
      content_type: text
      content: |-
        `bids_metrics` (display name **“Bids Metrics”**) is built on the **`bids_data`** model/table with **`__time`** as the primary time dimension (the view supports analysis down to **hour** grain). Conceptually, this view is about **demand-side performance**: bids, wins/impressions, spend, and downstream engagement (clicks/video).

        ## What you can slice by (dimensions)
        You can break performance down across advertiser/campaign structure, inventory, device, and creative attributes:

        - **Time**
          - `__time` (timestamp)

        - **Advertiser / campaign hierarchy**
          - `advertiser_name`, `campaign_name`, `line_item_name`
          - `adomain` (advertiser domain)

        - **Inventory / publisher**
          - `pub_name`
          - `app_site_name`, `app_site_domain`
          - `app_or_site` (app vs site)

        - **Auction / placement**
          - `auction_type`, `placement_type`
          - `interstitial` (flag-like categorical)
          - `bid_floor_bucket`

        - **Creative / video context**
          - `creative_type`, `player_size`, `video_activity`

        - **Device / platform / region**
          - `device_type`, `device_os`, `device_osv`, `platform_browser`
          - `device_region` (note: region, not country in this view)

        - **Privacy / SDK**
          - `privacy` (boolean)
          - `sdk`

        ## What you can measure (measures)
        This view has a richer KPI set spanning the funnel from bids → impressions → engagement:

        - **Volume & delivery**
          - `total_bids` = `sum(bid_cnt)`
          - `impressions` = `sum(imp_cnt)`
          - `win_rate` = `sum(imp_cnt) / sum(bid_cnt)` (formatted as %)

        - **Spend & pricing**
          - `overall_spend` = `sum(media_spend_usd) / 1000` (USD)
          - `avg_bid_price` = `sum(bid_price_usd) / sum(bid_cnt) / 1000` (USD)
          - `ecpm` = `sum(media_spend_usd) / 1000 / sum(imp_cnt)` (USD)
          - `avg_bid_floor` = `sum(bid_floor) / sum(has_bid_floor_cnt)` (USD)

        - **Engagement**
          - `clicks` = `sum(click_reg_cnt)`
          - `ctr` = `sum(click_reg_cnt) / sum(imp_cnt)` (formatted as %)

        - **Video**
          - `video_starts` = `sum(video_start_cnt)`
          - `video_completes` = `sum(video_complete_cnt)`
          - `video_completion_rate` = `sum(video_complete_cnt) / sum(video_start_cnt)` (formatted as %)

        - **Trend smoothing (derived)**
          - `bids_7day_rolling_avg`: a **7-day rolling average of `total_bids`**, computed as a windowed `AVG(total_bids)` over `__time` with a frame of “6 days preceding through current row”.

        ## What this view is best for
        - Identifying **which advertisers/campaigns drive spend and delivery**
        - Diagnosing **win rate** changes (auction type, bid floor bucket, inventory, device)
        - Tracking **pricing efficiency** (avg bid price vs eCPM) and **engagement quality** (CTR, video completion rate)
        - Comparing performance under **privacy=true vs false** or across **SDKs**

        If you tell me whether you care most about *revenue/spend*, *win rate*, or *engagement quality*, I can suggest the first 4–6 queries to run (and the exact cuts) to get to actionable insights quickly.
