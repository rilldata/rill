  content: '{"response":"`bids_metrics` (display name **“Bids Metrics”**) is built on the **`bids_data`** model/table with **`__time`** as the primary time dimension (the view supports analysis down to **hour** grain). Conceptually, this view is about **demand-side performance**: bids, wins/impressions, spend, and downstream engagement (clicks/video).\n\n## What you can slice by (dimensions)\nYou can break performance down across advertiser/campaign structure, inventory, device, and creative attributes:\n\n- **Time**\n  - `__time` (timestamp)\n\n- **Advertiser / campaign hierarchy**\n  - `advertiser_name`, `campaign_name`, `line_item_name`\n  - `adomain` (advertiser domain)\n\n- **Inventory / publisher**\n  - `pub_name`\n  - `app_site_name`, `app_site_domain`\n  - `app_or_site` (app vs site)\n\n- **Auction / placement**\n  - `auction_type`, `placement_type`\n  - `interstitial` (flag-like categorical)\n  - `bid_floor_bucket`\n\n- **Creative / video context**\n  - `creative_type`, `player_size`, `video_activity`\n\n- **Device / platform / region**\n  - `device_type`, `device_os`, `device_osv`, `platform_browser`\n  - `device_region` (note: region, not country in this view)\n\n- **Privacy / SDK**\n  - `privacy` (boolean)\n  - `sdk`\n\n## What you can measure (measures)\nThis view has a richer KPI set spanning the funnel from bids → impressions → engagement:\n\n- **Volume \u0026 delivery**\n  - `total_bids` = `sum(bid_cnt)`\n  - `impressions` = `sum(imp_cnt)`\n  - `win_rate` = `sum(imp_cnt) / sum(bid_cnt)` (formatted as %)\n\n- **Spend \u0026 pricing**\n  - `overall_spend` = `sum(media_spend_usd) / 1000` (USD)\n  - `avg_bid_price` = `sum(bid_price_usd) / sum(bid_cnt) / 1000` (USD)\n  - `ecpm` = `sum(media_spend_usd) / 1000 / sum(imp_cnt)` (USD)\n  - `avg_bid_floor` = `sum(bid_floor) / sum(has_bid_floor_cnt)` (USD)\n\n- **Engagement**\n  - `clicks` = `sum(click_reg_cnt)`\n  - `ctr` = `sum(click_reg_cnt) / sum(imp_cnt)` (formatted as %)\n\n- **Video**\n  - `video_starts` = `sum(video_start_cnt)`\n  - `video_completes` = `sum(video_complete_cnt)`\n  - `video_completion_rate` = `sum(video_complete_cnt) / sum(video_start_cnt)` (formatted as %)\n\n- **Trend smoothing (derived)**\n  - `bids_7day_rolling_avg`: a **7-day rolling average of `total_bids`**, computed as a windowed `AVG(total_bids)` over `__time` with a frame of “6 days preceding through current row”.\n\n## What this view is best for\n- Identifying **which advertisers/campaigns drive spend and delivery**\n- Diagnosing **win rate** changes (auction type, bid floor bucket, inventory, device)\n- Tracking **pricing efficiency** (avg bid price vs eCPM) and **engagement quality** (CTR, video completion rate)\n- Comparing performance under **privacy=true vs false** or across **SDKs**\n\nIf you tell me whether you care most about *revenue/spend*, *win rate*, or *engagement quality*, I can suggest the first 4–6 queries to run (and the exact cuts) to get to actionable insights quickly."}'
