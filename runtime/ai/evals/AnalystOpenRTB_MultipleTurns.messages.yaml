  content_type: json
  content: '{"response":"`auctions_metrics` (display name **“Auctions Metrics”**) is a metrics view built on the **`auctions_data`** model/table, with **`__time`** as the primary time dimension. It’s designed to analyze **auction request volume and bid-floor dynamics** across inventory, publisher, device, and placement attributes—without needing to look at bid outcomes.\n\n### What you can slice by (dimensions)\nIt includes one time dimension and a set of categorical breakdowns:\n\n- **Time**\n  - `__time` (timestamp; smallest grain supported in the view is **hour**)\n\n- **Inventory / publisher**\n  - `app_site_name`, `app_site_domain`, `app_site_cat`\n  - `pub_name`\n  - `app_or_site` (app vs site)\n\n- **Ad / placement**\n  - `ad_size`, `ad_position`, `placement_type`, `auction_type`\n  - `video_min_duration_bucket`, `video_max_duration_bucket`\n\n- **Device / platform / geo**\n  - `device_type`, `device_os`, `device_osv`, `platform_browser`\n  - `device_state`, `device_country`\n\n- **Pricing control**\n  - `bid_floor_bucket` (bucketed bid floor)\n\n### What you can measure (measures)\nThere are three measures, all aggregated:\n\n- **`requests`**: total auction/bid requests  \n  - Expression: `sum(bid_request_cnt)`\n\n- **`avg_bid_floor`**: average bid floor (USD)  \n  - Expression: `sum(bid_floor) / sum(has_bid_floor_cnt)`  \n  - (This implies it averages only over rows where a bid floor exists, using `has_bid_floor_cnt` as the denominator.)\n\n- **`1d_qps`**: average requests per second over a day-equivalent window  \n  - Expression: `sum(bid_request_cnt) / 86400`\n\n### What this view is best for\n- Monitoring **supply/request volume trends** over time (requests, QPS)\n- Understanding **where traffic is coming from** (publisher, app/site, domain/category)\n- Diagnosing **pricing pressure** via bid floors (avg bid floor, bid floor buckets)\n- Segmenting by **device + geo + placement** to find operational or monetization differences\n\nIf you tell me what decision you’re trying to make (e.g., “which publishers to prioritize” or “why QPS dropped”), I can suggest the most informative cuts to analyze—still without querying until you say so."}'
