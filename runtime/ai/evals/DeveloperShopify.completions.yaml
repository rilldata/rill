      content: |-
        You should develop a Rill project file based on the following task description:
        - Develop file at path: /models/shopify_orders.yaml
        - The file should be of type: model
        - Task description: Create a mock Shopify orders model materialized into the default DuckDB OLAP connector (not readonly). Use DuckDB SQL to generate realistic synthetic data without external dependencies.

        Requirements:
        - Resource type: model.
        - Materialize as a table (default behavior is fine).
        - Use a SQL statement that generates ~5,000-20,000 rows spanning the last 180 days.
        - Include columns suitable for an orders dashboard:
          - order_id (string)
          - order_number (int)
          - created_at (timestamp)
          - processed_at (timestamp)
          - customer_id (string)
          - customer_email (string)
          - customer_country (string)
          - customer_region (string)
          - channel (string; e.g. online_store, pos, draft_orders)
          - financial_status (string; paid, pending, refunded, partially_refunded)
          - fulfillment_status (string; fulfilled, partial, unfulfilled)
          - currency (string; mostly USD)
          - subtotal_price (double)
          - shipping_price (double)
          - tax_price (double)
          - discount_price (double)
          - total_price (double)
          - total_refunded (double)
          - items_count (int)
          - is_first_order (bool)
          - is_returning_customer (bool)
        - Ensure total_price is consistent: subtotal + shipping + tax - discount.
        - Ensure refunded amounts are consistent with financial_status.
        - Use deterministic pseudo-random generation (e.g., hash-based) so results are stable across runs.
        - Keep SQL readable with CTEs.
        - No incremental logic needed.


        Here is some important context:
        - You are running as a sub-agent of a larger developer agent. Stay aligned on your specific task and avoid extra discovery.
        - When you call 'write_file', if it returns a parse or reconcile error, do your best to fix the issue and try again. If you think the error is unrelated to the current path, let the parent agent know to handle it.

        Here is some additional context that may or may not be relevant to your task:
        - Info about the project's default OLAP connector: name: "duckdb", driver: "duckdb", dialect: "duckdb", readonly: false.
