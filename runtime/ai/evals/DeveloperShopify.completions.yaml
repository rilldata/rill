    - role: tool
      content_type: tool_response
      id: 384696198cc14300
      content: '{"Contents":"type: metrics_view\n\ndisplay_name: Shopify Orders\nmodel: shopify_orders\n\ntimeseries: created_at\nsmallest_time_grain: day\n\ndimensions:\n  - name: created_at\n    column: created_at\n\n  - name: customer_country\n    column: customer_country\n\n  - name: customer_region\n    column: customer_region\n\n  - name: channel\n    column: channel\n\n  - name: financial_status\n    column: financial_status\n\n  - name: fulfillment_status\n    column: fulfillment_status\n\n  - name: payment_gateway\n    column: payment_gateway\n\n  - name: discount_code\n    column: discount_code\n\n  - name: is_first_order\n    column: is_first_order\n\n  - name: marketing_opt_in\n    column: marketing_opt_in\n\nmeasures:\n  - name: orders\n    display_name: Orders\n    expression: COUNT(*)\n    format_preset: humanize\n\n  - name: gross_sales\n    display_name: Gross Sales\n    expression: SUM(subtotal_price)\n    format_preset: currency_usd\n\n  - name: discounts\n    display_name: Discounts\n    expression: SUM(discount_price)\n    format_preset: currency_usd\n\n  - name: shipping\n    display_name: Shipping\n    expression: SUM(shipping_price)\n    format_preset: currency_usd\n\n  - name: taxes\n    display_name: Taxes\n    expression: SUM(tax_price)\n    format_preset: currency_usd\n\n  - name: net_sales\n    display_name: Net Sales\n    expression: SUM(subtotal_price - discount_price)\n    format_preset: currency_usd\n\n  - name: total_sales\n    display_name: Total Sales\n    expression: SUM(total_price)\n    format_preset: currency_usd\n\n  - name: refunded\n    display_name: Refunded\n    expression: SUM(total_refunded)\n    format_preset: currency_usd\n\n  - name: avg_order_value\n    display_name: Avg Order Value\n    expression: SUM(total_price) / NULLIF(COUNT(*), 0)\n    format_preset: currency_usd\n    valid_percent_of_total: false\n\n  - name: items_sold\n    display_name: Items Sold\n    expression: SUM(items_count)\n    format_preset: humanize\n\n  # Derived measures\n  - name: refund_rate\n    display_name: Refund Rate\n    expression: SUM(total_refunded) / NULLIF(SUM(total_price), 0)\n    format_preset: percentage\n    valid_percent_of_total: false\n\n  - name: discount_rate\n    display_name: Discount Rate\n    expression: SUM(discount_price) / NULLIF(SUM(subtotal_price), 0)\n    format_preset: percentage\n    valid_percent_of_total: false\n"}'
