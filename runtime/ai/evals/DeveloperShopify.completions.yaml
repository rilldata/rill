et: currency_usd\n+    valid_percent_of_total: false\n+\n+  - name: items_sold\n+    display_name: Items Sold\n+    expression: SUM(items_count)\n+    format_preset: humanize\n+\n+  # Derived measures\n+  - name: refund_rate\n+    display_name: Refund Rate\n+    expression: SUM(total_refunded) / NULLIF(SUM(total_price), 0)\n+    format_preset: percentage\n+    valid_percent_of_total: false\n+\n+  - name: discount_rate\n+    display_name: Discount Rate\n+    expression: SUM(discount_price) / NULLIF(SUM(subtotal_price), 0)\n+    format_preset: percentage\n+    valid_percent_of_total: false\n+\n","is_new_file":true,"resources":[{"kind":"rill.runtime.v1.MetricsView","name":"shopify_orders","reconcile_error":"","reconcile_status":"RECONCILE_STATUS_IDLE"},{"kind":"rill.runtime.v1.Explore","name":"shopify_orders","reconcile_error":"","reconcile_status":"RECONCILE_STATUS_IDLE"}]}'
