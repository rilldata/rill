ize\n\n  # Derived measures\n  - name: refund_rate\n    display_name: Refund Rate\n    expression: SUM(total_refunded) / NULLIF(SUM(total_price), 0)\n    format_preset: percentage\n    valid_percent_of_total: false\n\n  - name: discount_rate\n    display_name: Discount Rate\n    expression: SUM(discount_price) / NULLIF(SUM(subtotal_price), 0)\n    format_preset: percentage\n    valid_percent_of_total: false\n","path":"/metrics/shopify_orders.yaml"}'
