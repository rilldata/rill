      content: '{"response":"Created `/models/shopify_orders.yaml` as a **materialized** DuckDB model that generates deterministic, realistic mock Shopify orders data.\n\nKey characteristics implemented:\n- ~12,000 orders spanning the **last 180 days**\n- Deterministic pseudo-randomness using `hash(order_number)`-based seeds (stable across runs)\n- All requested dashboard-ready columns included\n- `total_price` is computed consistently as: `subtotal_price + shipping_price + tax_price - discount_price`\n- `total_refunded` is consistent with `financial_status` (`paid/pending =\u003e 0`, `refunded =\u003e full`, `partially_refunded =\u003e partial capped at total`)\n- Uses readable CTE structure; no external dependencies; no incremental logic"}'
