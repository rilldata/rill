      content: '{"path":"metrics/shopify_orders.yaml","prompt":"Create a metrics view for the `shopify_orders` model/table.\n\nRequirements:\n- type: metrics_view\n- model: shopify_orders\n- Define a primary time dimension using created_at (timeseries).\n- Include dimensions: channel, financial_status, fulfillment_status, customer_country, customer_region, currency, is_first_order, is_returning_customer.\n- Include measures:\n  - orders: count(*)\n  - gross_sales: sum(subtotal_price)\n  - discounts: sum(discount_price)\n  - shipping: sum(shipping_price)\n  - taxes: sum(tax_price)\n  - net_sales: sum(total_price)\n  - refunded: sum(total_refunded)\n  - avg_order_value: sum(total_price) / nullif(count(*),0)\n  - items_sold: sum(items_count)\n- Use correct YAML schema for Rill metrics views.\n- Keep it minimal and valid.\n","type":"metrics_view"}'
