      content: '{"path":"models/shopify_orders.yaml","prompt":"Create a mock Shopify orders model materialized into the default DuckDB OLAP connector (not readonly). Use DuckDB SQL to generate realistic synthetic data without external dependencies.\n\nRequirements:\n- Resource type: model.\n- Materialize as a table (default behavior is fine).\n- Use a SQL statement that generates ~5,000-20,000 rows spanning the last 180 days.\n- Include columns suitable for an orders dashboard:\n  - order_id (string)\n  - order_number (int)\n  - created_at (timestamp)\n  - processed_at (timestamp)\n  - customer_id (string)\n  - customer_email (string)\n  - customer_country (string)\n  - customer_region (string)\n  - channel (string; e.g. online_store, pos, draft_orders)\n  - financial_status (string; paid, pending, refunded, partially_refunded)\n  - fulfillment_status (string; fulfilled, partial, unfulfilled)\n  - currency (string; mostly USD)\n  - subtotal_price (double)\n  - shipping_price (double)\n  - tax_price (double)\n  - discount_price (double)\n  - total_price (double)\n  - total_refunded (double)\n  - items_count (int)\n  - is_first_order (bool)\n  - is_returning_customer (bool)\n- Ensure total_price is consistent: subtotal + shipping + tax - discount.\n- Ensure refunded amounts are consistent with financial_status.\n- Use deterministic pseudo-random generation (e.g., hash-based) so results are stable across runs.\n- Keep SQL readable with CTEs.\n- No incremental logic needed.\n","type":"model"}'
