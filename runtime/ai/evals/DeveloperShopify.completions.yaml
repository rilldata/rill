      content: '{"path":"metrics/shopify_orders.yaml","prompt":"Create a metrics view named shopify_orders on top of the model/table shopify_orders.\n\nInclude a primary timeseries dimension on created_at (time_grain: day).\n\nDimensions (at least):\n- created_at (timeseries)\n- customer_country\n- customer_region\n- channel\n- financial_status\n- fulfillment_status\n- payment_gateway\n- discount_code\n- is_first_order\n- marketing_opt_in\n\nMeasures (at least):\n- orders: count(*)\n- gross_sales: sum(subtotal_price)\n- discounts: sum(discount_price)\n- shipping: sum(shipping_price)\n- taxes: sum(tax_price)\n- net_sales: sum(subtotal_price - discount_price)\n- total_sales: sum(total_price)\n- refunded: sum(total_refunded)\n- avg_order_value: sum(total_price)/nullif(count(*),0)\n- items_sold: sum(items_count)\n\nAdd a couple of useful derived measures if appropriate (e.g. refund_rate = refunded/total_sales).\n\nSet formatting (currency for money measures, percent for rates) where supported.\n\nKeep YAML valid for Rill metrics view resources.","type":"metrics_view"}'
