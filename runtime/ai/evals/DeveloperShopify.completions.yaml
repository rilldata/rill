      content: '{"Contents":"type: metrics_view\nmodel: shopify_orders\n\ntimeseries: created_at\n\ndimensions:\n  - name: channel\n    column: channel\n  - name: financial_status\n    column: financial_status\n  - name: fulfillment_status\n    column: fulfillment_status\n  - name: customer_country\n    column: customer_country\n  - name: customer_region\n    column: customer_region\n  - name: currency\n    column: currency\n  - name: is_first_order\n    column: is_first_order\n  - name: is_returning_customer\n    column: is_returning_customer\n\nmeasures:\n  - name: orders\n    display_name: Orders\n    expression: COUNT(*)\n    format_preset: humanize\n  - name: gross_sales\n    display_name: Gross Sales\n    expression: SUM(subtotal_price)\n    format_preset: currency_usd\n  - name: discounts\n    display_name: Discounts\n    expression: SUM(discount_price)\n    format_preset: currency_usd\n  - name: shipping\n    display_name: Shipping\n    expression: SUM(shipping_price)\n    format_preset: currency_usd\n  - name: taxes\n    display_name: Taxes\n    expression: SUM(tax_price)\n    format_preset: currency_usd\n  - name: net_sales\n    display_name: Net Sales\n    expression: SUM(total_price)\n    format_preset: currency_usd\n  - name: refunded\n    display_name: Refunded\n    expression: SUM(total_refunded)\n    format_preset: currency_usd\n  - name: avg_order_value\n    display_name: Avg Order Value\n    expression: SUM(total_price) / NULLIF(COUNT(*), 0)\n    format_preset: currency_usd\n    valid_percent_of_total: false\n  - name: items_sold\n    display_name: Items Sold\n    expression: SUM(items_count)\n    format_preset: humanize\n"}'
