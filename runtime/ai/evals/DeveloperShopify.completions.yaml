evel":"INFO","message":"Reconciling resource","time":"2026-03-04T13:00:11.72475Z"},{"json_payload":"{\"name\":\"shopify_orders\",\"type\":\"MetricsView\"}","level":"INFO","message":"Reconciling resource","time":"2026-03-04T13:00:11.731256Z"},{"json_payload":"{\"name\":\"parser\",\"type\":\"ProjectParser\",\"elapsed\":\"7ms\"}","level":"INFO","message":"Reconciled resource","time":"2026-03-04T13:00:11.731276Z"},{"json_payload":"{\"name\":\"shopify_orders\",\"type\":\"MetricsView\",\"elapsed\":\"13ms\"}","level":"INFO","message":"Reconciled resource","time":"2026-03-04T13:00:11.744002Z"},{"json_payload":"{\"name\":\"shopify_orders\",\"type\":\"Explore\"}","level":"INFO","message":"Reconciling resource","time":"2026-03-04T13:00:11.744093Z"},{"json_payload":"{\"name\":\"shopify_orders\",\"type\":\"Explore\"}","level":"INFO","message":"Reconciled resource","time":"2026-03-04T13:00:11.744147Z"},{"json_payload":"{\"name\":\"parser\",\"type\":\"ProjectParser\"}","level":"INFO","message":"Reconciling resource","time":"2026-03-04T13:00:19.737413Z"},{"json_payload":"{\"name\":\"shopify_orders\",\"type\":\"Explore\"}","level":"INFO","message":"Reconciling resource","time":"2026-03-04T13:00:19.744516Z"},{"json_payload":"{\"name\":\"parser\",\"type\":\"ProjectParser\",\"elapsed\":\"7ms\"}","level":"INFO","message":"Reconciled resource","time":"2026-03-04T13:00:19.744529Z"},{"json_payload":"{\"name\":\"shopify_orders\",\"type\":\"Explore\"}","level":"INFO","message":"Reconciled resource","time":"2026-03-04T13:00:19.744603Z"}]}'
