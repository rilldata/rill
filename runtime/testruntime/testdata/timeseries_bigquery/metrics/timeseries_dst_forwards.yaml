version: 1
type: metrics_view

display_name: timeseries_dst
table: timeseries_dst_forwards
database: rilldata
database_schema: integration_test
timeseries: timestamp
first_day_of_week: 7

measures:
  - display_name: Total records
    expression: count(*)
    name: total_records
    description: Total number of records present
    format_preset: humanize
    valid_percent_of_total: true

dimensions:
  - name: label
    column: label

available_time_zones:
  - America/Los_Angeles
  - America/Chicago
  - America/New_York
  - Europe/London
  - Europe/Paris
  - Asia/Jerusalem
  - Europe/Moscow
  - Asia/Kolkata
  - Asia/Shanghai
  - Asia/Tokyo
  - Australia/Sydney
